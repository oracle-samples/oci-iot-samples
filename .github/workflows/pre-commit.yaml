name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check repository policy
        env:
          BASE_REVISION: >-
            ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -n "${BASE_REVISION}" && ! "${BASE_REVISION}" =~ ^0+$ ]]; then
            python3 pre_commit_hooks/repository_policy.py \
              --added-since "${BASE_REVISION}"
          else
            python3 pre_commit_hooks/repository_policy.py
          fi

      - name: Run Super-Linter
        uses: github/super-linter/slim@ce838ab356d25fc8e83a16fa6d1fc6f583e14e87 # slim-v8.6.0
        env:
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          EXPORT_GITHUB_TOKEN: false
          LINTER_RULES_PATH: .
          MULTI_STATUS: false
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_BASH: true
          VALIDATE_EDITORCONFIG: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_PYTHON_RUFF: true
          VALIDATE_TERRAFORM_FMT: true
          VALIDATE_TERRAFORM_TFLINT: true
          VALIDATE_YAML: true
          EDITORCONFIG_FILE_NAME: .editorconfig-checker.json
          MARKDOWN_CONFIG_FILE: .markdownlint.yml
          PYTHON_BLACK_CONFIG_FILE: pyproject.toml
          PYTHON_RUFF_CONFIG_FILE: pyproject.toml
          TERRAFORM_TFLINT_CONFIG_FILE: .tflint.hcl

      - name: Scan Terraform configuration with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          cache: false
          exit-code: '1'
          format: table
          hide-progress: true
          scan-ref: samples/terraform
          scan-type: config
          version: v0.69.3
