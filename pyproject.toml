[tool.black]
line-length = 88
required-version = "26.3.1"
target-version = ["py312"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["C4", "D", "E", "F", "I", "N", "W"]
ignore = ["D100", "D103", "D212", "E203", "E402", "E501"]

[tool.ruff.lint.isort]
known-first-party = ["archive_domain", "file_agent", "manage_dt"]

[tool.ruff.lint.pydocstyle]
convention = "google"
